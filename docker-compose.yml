services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: sweet_kingdom
      DB_USER: sweet_user
      DB_PASSWORD: sweet_pass
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sweet_kingdom
      MYSQL_USER: sweet_user
      MYSQL_PASSWORD: sweet_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/sweet_kingdom.sql:/docker-entrypoint-initdb.d/sweet_kingdom.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: sweet_user
      PMA_PASSWORD: sweet_pass
    depends_on:
      - db

volumes:
  db_data: